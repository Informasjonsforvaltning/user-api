---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    fdk.service: user-api
  name: user-api
spec:
  replicas: 1
  selector:
    matchLabels:
      fdk.service: user-api
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        fdk.service: user-api
    spec:
      containers:
        - name: user-api
          env:
            - name: ORGNR_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ORGNR_WHITELIST
            - name: ORGFORM_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ORGFORM_WHITELIST
            - name: ADMIN_LIST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ADMIN_LIST
            - name: SSO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: common
                  key: SSO_API_KEY
            - name: USER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: common
                  key: USER_API_KEY
            - name: WRITE_GROUP_BRREG
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: BRREG_OIDC_WRITE_GROUP
            - name: ADMIN_GROUP_BRREG
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: BRREG_OIDC_ADMIN_GROUP
            - name: ADMIN_GROUP_SKATT
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: SKATT_OIDC_ADMIN_GROUP
            - name: WRITE_GROUP_SKATT
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: SKATT_OIDC_WRITE_GROUP
            - name: READ_GROUP_SKATT
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: SKATT_OIDC_READ_GROUP
            - name: TERMS_AND_CONDITIONS_HOST
              valueFrom:
                secretKeyRef:
                  name: commonurl
                  key: FDK_TERMS_AND_CONDITIONS_BASE_URI
            - name: MASKINPORTEN_API_HOST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: MASKINPORTEN_API_HOST
            - name: MASKINPORTEN_SCOPE
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: MASKINPORTEN_SCOPE
            - name: ALTINN_ACCESS_MANAGEMENT_HOST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ALTINN_ACCESS_MANAGEMENT_HOST
          image: user-api
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "500Mi"
              cpu: "10m"
            limits:
              memory: "500Mi"
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
      restartPolicy: Always
