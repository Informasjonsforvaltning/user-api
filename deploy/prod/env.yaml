---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  labels:
    app: user-api
spec:
  template:
    spec:
      containers:
        - name: user-api
          env:
            - name: ORGNR_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ORGNR_WHITELIST
            - name: ORGFORM_WHITELIST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ORGFORM_WHITELIST
            - name: ADMIN_LIST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ADMIN_LIST
            - name: SSO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: common
                  key: SSO_API_KEY
            - name: USER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: common
                  key: USER_API_KEY
            - name: WRITE_GROUP_BRREG
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: BRREG_OIDC_WRITE_GROUP
            - name: ADMIN_GROUP_BRREG
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: BRREG_OIDC_ADMIN_GROUP
            - name: ADMIN_GROUP_SKATT
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: SKATT_OIDC_ADMIN_GROUP
            - name: WRITE_GROUP_SKATT
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: SKATT_OIDC_WRITE_GROUP
            - name: READ_GROUP_SKATT
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: SKATT_OIDC_READ_GROUP
            - name: TERMS_AND_CONDITIONS_HOST
              valueFrom:
                secretKeyRef:
                  name: commonurl
                  key: FDK_TERMS_AND_CONDITIONS_BASE_URI
            - name: MASKINPORTEN_API_HOST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: MASKINPORTEN_API_HOST
            - name: MASKINPORTEN_SCOPE
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: MASKINPORTEN_SCOPE
            - name: MASKINPORTEN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fdk-maskinporten-exchange
                  key: INTERNAL_API_KEY
            - name: ALTINN_ACCESS_MANAGEMENT_HOST
              valueFrom:
                secretKeyRef:
                  name: user-api
                  key: ALTINN_ACCESS_MANAGEMENT_HOST
